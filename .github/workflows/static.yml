    <script>
        // Data derived from the Source Report Strategy
        const brandPillars = {
            labels: ['Heritage', 'Non-Conformity', 'Ritual', 'Flavor Complexity', 'Fandom'],
            datasets: [{
                label: 'Brand Strategy Focus',
                data: [95, 90, 85, 98, 88],
                backgroundColor: 'rgba(113, 31, 46, 0.2)',
                borderColor: '#711F2E',
                pointBackgroundColor: '#D4AF37',
                borderWidth: 2
            }]
        };

        const performanceData = {
            labels: ['LCP (Loading)', 'INP (Interaction)', 'CLS (Stability)', 'First Content Paint'],
            datasets: [{
                label: 'Performance Target (ms)',
                data: [1500, 100, 0.1, 800],
                backgroundColor: ['#711F2E', '#9A1B2F', '#D4AF37', '#1A1112'],
                borderRadius: 8
            }]
        };

        // Initialize Charts
        window.onload = function() {
            const ctxPillar = document.getElementById('pillarChart').getContext('2d');
            new Chart(ctxPillar, {
                type: 'radar',
                data: brandPillars,
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 100,
                            ticks: { display: false }
                        }
                    },
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            const ctxPerf = document.getElementById('performanceChart').getContext('2d');
            new Chart(ctxPerf, {
                type: 'bar',
                data: performanceData,
                options: {
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f0f0f0' }
                        }
                    }
                }
            });
        };

        // Interactive Quiz Logic
        let currentStep = 0;
        const quizData = [
            { text: "What's your primary flavor profile?", options: ["Spicy & Bold", "Sweet & Creamy", "Dark & Fruity"] },
            { text: "When do you need your Pepper?", options: ["Game Day Energy", "Chill Relaxation", "Late Night Focus"] },
            { text: "Finding your perfect 23...", options: [] }
        ];

        function nextQuizStep(choice) {
            currentStep++;
            const content = document.getElementById('quiz-content');
            
            if (currentStep < 2) {
                document.getElementById('quiz-text').innerText = quizData[currentStep].text;
                const optionsHtml = quizData[currentStep].options.map(opt => 
                    `<button onclick="nextQuizStep()" class="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-[#711F2E] hover:bg-[#FDFBF7] transition-all font-semibold text-gray-700">${opt}</button>`
                ).join('');
                document.getElementById('quiz-options').innerHTML = optionsHtml;
            } else {
                content.innerHTML = `
                    <div class="text-center">
                        <div class="w-20 h-20 bg-[#D4AF37] rounded-full flex items-center justify-center mx-auto mb-6">
                            <span class="text-white text-3xl">✓</span>
                        </div>
                        <h3 class="heading-font text-2xl font-black text-[#711F2E] mb-2">The Spicy Rebel</h3>
                        <p class="text-gray-500 mb-8 text-sm">Your profile matches <strong>Dr Pepper Cherry</strong>. We found 3 stores near you with stock!</p>
                        <button onclick="location.reload()" class="bg-[#711F2E] text-white px-8 py-3 rounded-full font-bold hover:bg-[#9A1B2F]">Get Coupon</button>
                    </div>
                `;
            }
        }

        // Simple Nav Scroll Spy
        window.addEventListener('scroll', () => {
            const sections = document.querySelectorAll('section');
            const navLinks = document.querySelectorAll('.nav-link');
            
            let current = '';
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 120) {
                    current = section.getAttribute('id');
                }
            });

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href').includes(current)) {
                    link.classList.add('active');
                }
            });
        });

        // Gemini API configuration
        // Leave apiKey as-is (empty string). Canvas runtime environment handles API keys safely on-the-fly.
        const apiKey = "";
        
        // Tab switching utility
        function switchAITab(tabId) {
            document.getElementById('ai-tab-content-flavor-lab').classList.add('hidden');
            document.getElementById('ai-tab-content-copy-suite').classList.add('hidden');
            
            document.getElementById('tab-flavor-lab').className = "flex-1 py-5 px-6 font-bold text-sm tracking-wide uppercase transition-colors text-center border-b-2 border-transparent text-gray-400 hover:text-[#711F2E]";
            document.getElementById('tab-copy-suite').className = "flex-1 py-5 px-6 font-bold text-sm tracking-wide uppercase transition-colors text-center border-b-2 border-transparent text-gray-400 hover:text-[#711F2E]";
            
            if (tabId === 'flavor-lab') {
                document.getElementById('ai-tab-content-flavor-lab').classList.remove('hidden');
                document.getElementById('tab-flavor-lab').className = "flex-1 py-5 px-6 font-bold text-sm tracking-wide uppercase transition-colors text-center border-b-2 border-[#711F2E] text-[#711F2E]";
            } else {
                document.getElementById('ai-tab-content-copy-suite').classList.remove('hidden');
                document.getElementById('tab-copy-suite').className = "flex-1 py-5 px-6 font-bold text-sm tracking-wide uppercase transition-colors text-center border-b-2 border-[#711F2E] text-[#711F2E]";
            }
        }

        // Utility to fetch with exponential backoff if throttled
        async function fetchWithRetry(url, options, maxRetries = 3) {
            let delay = 1000;
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (response.status === 429) {
                        // Throttling: Exponential Backoff
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                        continue;
                    }
                    throw new Error(`API returned error state: ${response.statusText}`);
                } catch (err) {
                    if (i === maxRetries - 1) throw err;
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        // AI Flavor Concept Lab Main Controller
        async function generateCustomFlavor() {
            const vibe = document.getElementById('ai-flavor-vibe').value.trim() || "Retro Galactic Gamer";
            const theme = document.getElementById('ai-flavor-modifier').value;
            
            // Show loaders, hide layouts
            document.getElementById('flavor-placeholder').classList.add('hidden');
            document.getElementById('flavor-result-container').classList.add('hidden');
            document.getElementById('flavor-loading').classList.remove('hidden');
            document.getElementById('flavor-error').classList.add('hidden');
            
            const systemPrompt = "You are a world-class creative beverage development agent for Dr Pepper. Generate custom, highly engaging, tasty, and futuristic Dr Pepper 23-flavor concept formulas. Provide results strictly matching the requested JSON Schema.";
            const userQuery = `Create a completely new experimental custom Dr Pepper beverage flavor based on the user's vibe: "${vibe}" using the brand style: "${theme}". Suggest 3 unique ingredients that pair beautifully with the classic Dr Pepper base. Make the tagline punchy and the can visualizer description detailed for Imagen production.`;
            
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            "flavorName": { "type": "STRING" },
                            "tagline": { "type": "STRING" },
                            "description": { "type": "STRING" },
                            "keyIngredients": {
                                "type": "ARRAY",
                                "items": { "type": "STRING" }
                            },
                            "imagePrompt": { "type": "STRING", "description": "Highly descriptive image prompt detailing a stunning minimalist aluminum beverage can mock-up design featuring modern labels matching this flavor. Front centered perspective, professional studio lighting, clean background, appetizing water droplets." }
                        },
                        required: ["flavorName", "tagline", "description", "keyIngredients", "imagePrompt"]
                    }
                },
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                // Fetch structured copy from Gemini
                const result = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const contentPart = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!contentPart) throw new Error("Invalid format received from Gemini.");
                
                const data = JSON.parse(contentPart);
                
                // Populate content UI fields
                document.getElementById('res-flavor-name').innerText = data.flavorName;
                document.getElementById('res-flavor-tagline').innerText = data.tagline;
                document.getElementById('res-flavor-desc').innerText = data.description;
                
                const ingredientsContainer = document.getElementById('res-flavor-ingredients');
                ingredientsContainer.innerHTML = '';
                data.keyIngredients.forEach(ingredient => {
                    const el = document.createElement('span');
                    el.className = "bg-[#711F2E]/10 text-[#711F2E] text-[10px] font-black uppercase px-2 py-1 rounded-full border border-[#711F2E]/20";
                    el.innerText = ingredient;
                    ingredientsContainer.appendChild(el);
                });

                // Display UI Text
                document.getElementById('flavor-loading').classList.add('hidden');
                document.getElementById('flavor-result-container').classList.remove('hidden');

                // Trigger Imagen 4.0 Visual Generation
                await generateCanMockup(data.imagePrompt);

            } catch (err) {
                console.error(err);
                document.getElementById('flavor-loading').classList.add('hidden');
                document.getElementById('flavor-placeholder').classList.remove('hidden');
                const errorBox = document.getElementById('flavor-error');
                errorBox.innerText = `Error: ${err.message}. Please verify connectivity.`;
                errorBox.classList.remove('hidden');
            }
        }

        // Can design generator using Imagen-4.0
        async function generateCanMockup(imagePrompt) {
            const imagenLoading = document.getElementById('imagen-loading');
            const canImg = document.getElementById('res-can-img');
            const canPlaceholder = document.getElementById('res-can-placeholder');
            
            imagenLoading.classList.remove('hidden');
            canImg.classList.add('hidden');
            canPlaceholder.classList.add('hidden');

            const optimizedPrompt = `A high fidelity, sleek commercial product shot of: ${imagePrompt}. Modern styled canned beverage art, 3D render look, flawless lighting, commercial drink advertisement photography.`;
            const imagenUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            
            const payload = { 
                instances: { prompt: optimizedPrompt }, 
                parameters: { "sampleCount": 1 } 
            };

            try {
                const response = await fetch(imagenUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (result.predictions && result.predictions.length > 0 && result.predictions[0].bytesBase64Encoded) {
                    const base64Data = result.predictions[0].bytesBase64Encoded;
                    canImg.src = `data:image/png;base64,${base64Data}`;
                    canImg.classList.remove('hidden');
                } else {
                    throw new Error("Imagen generation did not return valid bytes.");
                }
            } catch (err) {
                console.error("Imagen image failed, rendering fallback emoji can style: ", err);
                canPlaceholder.classList.remove('hidden');
            } finally {
                imagenLoading.classList.add('hidden');
            }
        }

        // AI Ad Copy Suite Main Controller
        async function generateAdCopy() {
            const audience = document.getElementById('ai-copy-audience').value;
            const pillar = document.getElementById('ai-copy-pillar').value;
            
            document.getElementById('copy-placeholder').classList.add('hidden');
            document.getElementById('copy-result-container').classList.add('hidden');
            document.getElementById('copy-loading').classList.remove('hidden');
            document.getElementById('copy-error').classList.add('hidden');

            const systemPrompt = "You are a professional ad agency copywriter. Output structured advertising campaigns strictly in the specified JSON schema format.";
            const userQuery = `Write high-converting ad copy targeting: "${audience}" promoting the core campaign concept: "${pillar}". Produce creative, energetic copy matching the legendary playful flavor of Dr Pepper. Include a TikTok video script prompt/hook, a billboard title, and a targeted email campaign starter.`;
            
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: userQuery }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            "tiktokHook": { "type": "STRING" },
                            "billboardHeader": { "type": "STRING" },
                            "emailSubjectAndBody": { "type": "STRING" }
                        },
                        required: ["tiktokHook", "billboardHeader", "emailSubjectAndBody"]
                    }
                },
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            try {
                const result = await fetchWithRetry(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const contentPart = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!contentPart) throw new Error("Invalid structure from copywriting engine.");
                
                const data = JSON.parse(contentPart);
                
                document.getElementById('res-copy-tiktok').innerText = data.tiktokHook;
                document.getElementById('res-copy-hero').innerText = data.billboardHeader;
                document.getElementById('res-copy-email').innerText = data.emailSubjectAndBody;

                document.getElementById('copy-loading').classList.add('hidden');
                document.getElementById('copy-result-container').classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('copy-loading').classList.add('hidden');
                document.getElementById('copy-placeholder').classList.remove('hidden');
                const errorBox = document.getElementById('copy-error');
                errorBox.innerText = `Error generating copywriting mockups: ${err.message}`;
                errorBox.classList.remove('hidden');
            }
        }
    </script>
